<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대행사별 파일 분할기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fflate/0.8.2/fflate.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e2e2de;
    --border-hover: #c8c8c2;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --text-muted: #a0a09a;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --success-border: #bbf7d0;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
  }
  .container { width: 100%; max-width: 600px; }
  header { margin-bottom: 32px; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text-secondary); margin-top: 5px; line-height: 1.6; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
  #upload-zone {
    border: 1.5px dashed var(--border-hover); border-radius: var(--radius);
    padding: 36px 24px; text-align: center; cursor: pointer; transition: all 0.15s; background: var(--bg);
  }
  #upload-zone:hover, #upload-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
  #upload-zone.has-file { border-style: solid; border-color: var(--success-border); background: var(--success-light); cursor: default; pointer-events: none; }
  .upload-icon { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--text-muted); }
  #upload-zone.has-file .upload-icon { color: var(--success); }
  #upload-label { font-size: 14px; font-weight: 500; }
  #upload-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  label.field-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  select, input[type="text"] {
    width: 100%; height: 38px; padding: 0 12px; font-size: 14px;
    color: var(--text-primary); background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    outline: none; transition: border-color 0.15s; font-family: inherit;
  }
  select:hover, input[type="text"]:hover { border-color: var(--border-hover); }
  select:focus, input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  .field-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--text-primary); }
  .chip-more { font-size: 12px; color: var(--text-muted); padding: 3px 4px; align-self: center; }
  .preview-count { font-size: 12px; color: var(--text-secondary); margin-top: 10px; }
  .filename-preview {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 12px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-secondary); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .filename-preview .agency-part { color: var(--accent); font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .btn-primary {
    width: 100%; height: 44px; background: var(--text-primary); color: #fff;
    font-size: 14px; font-weight: 500; font-family: inherit; border: none;
    border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }
  .btn-primary:active:not(:disabled) { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    width: 100%; height: 38px; background: transparent; color: var(--text-secondary);
    font-size: 13px; font-family: inherit; border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s; margin-top: 8px;
  }
  .btn-secondary:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .result-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .result-item:last-child { border-bottom: none; }
  .result-item .filename { flex: 1; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-item .row-count { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }
  .icon-success { color: var(--success); flex-shrink: 0; }
  svg.icon { width: 16px; height: 16px; flex-shrink: 0; }
  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--text-primary); border-radius: 2px; transition: width 0.2s; }
  .progress-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>대행사별 파일 분할기</h1>
    <p>엑셀 파일을 업로드하면 대행사명 기준으로 자동 분할합니다.<br>원본 포맷과 스타일이 유지되며, 모든 파일을 ZIP으로 한 번에 다운로드합니다.</p>
  </header>

  <div class="card">
    <div class="card-title">01 파일 업로드</div>
    <div id="upload-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="ev(event,'drag-over',true)"
      ondragleave="ev(event,'drag-over',false)"
      ondrop="onDrop(event)">
      <svg class="upload-icon" id="upload-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M16 12l-4-4m0 0l-4 4m4-4v12"/>
      </svg>
      <div id="upload-label">클릭하거나 파일을 드래그하세요</div>
      <div id="upload-sub">.xlsx, .xls 파일</div>
      <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="handleFile(event)">
    </div>
  </div>

  <div class="card hidden" id="config-card">
    <div class="card-title">02 설정</div>
    <div class="row-2">
      <div class="field">
        <label class="field-label" for="sheet-select">시트</label>
        <select id="sheet-select" onchange="onSheetChange()"></select>
      </div>
      <div class="field">
        <label class="field-label" for="col-select">대행사명 컬럼</label>
        <select id="col-select" onchange="onColChange()"></select>
      </div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label class="field-label" for="filename-suffix">파일명 규칙</label>
      <div style="display:flex; align-items:center;">
        <span style="height:38px; display:flex; align-items:center; padding:0 10px; background:var(--bg); border:1px solid var(--border); border-right:none; border-radius:var(--radius-sm) 0 0 var(--radius-sm); font-size:14px; color:var(--accent); font-weight:600; white-space:nowrap; flex-shrink:0;">{agency}_</span>
        <input type="text" id="filename-suffix" placeholder="2025년5월_성과보고서" oninput="updateFilenamePreview()" style="border-radius:0 var(--radius-sm) var(--radius-sm) 0;">
      </div>
      <div class="field-hint">대행사명이 앞에 자동으로 붙습니다 &nbsp;·&nbsp; 예: (주)예지솔루션_2025년5월_성과보고서.xlsx</div>
      <div class="filename-preview" id="filename-preview"></div>
    </div>
    <div class="divider"></div>
    <div>
      <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">발견된 대행사</div>
      <div class="chips-wrap" id="agency-chips"></div>
      <div class="preview-count" id="preview-count"></div>
    </div>
  </div>

  <div id="split-area" class="hidden">
    <button class="btn-primary" id="split-btn" onclick="splitFiles()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-8-4l4 4 4-4m-4-8v12"/>
      </svg>
      ZIP으로 일괄 다운로드
    </button>
    <div class="progress-bar-wrap hidden" id="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label hidden" id="progress-label"></div>
  </div>

  <div class="card hidden" id="result-card">
    <div class="card-title">완료</div>
    <div id="result-list"></div>
    <button class="btn-secondary" onclick="location.reload()">↺ 다시 시작</button>
  </div>

</div>

<script>
/* ── state ── */
let WB = null;           // parsed workbook (with rawFile for re-read)
let rawBuffer = null;    // original ArrayBuffer
let sheetCache = {};     // sheetName → array-of-arrays

/* ── helpers ── */
function ev(e, cls, add) {
  e.preventDefault();
  document.getElementById('upload-zone').classList[add ? 'add' : 'remove'](cls);
}
function onDrop(e) {
  e.preventDefault();
  ev(e, 'drag-over', false);
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
}
function handleFile(e) { if (e.target.files[0]) processFile(e.target.files[0]); }

function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    rawBuffer = e.target.result.slice(0); // keep copy
    WB = XLSX.read(rawBuffer, { type: 'array', cellStyles: true, cellNF: true, cellDates: true });

    const zone = document.getElementById('upload-zone');
    zone.classList.add('has-file');
    document.getElementById('upload-icon-svg').innerHTML =
      '<path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="1.5"/>';
    document.getElementById('upload-label').textContent = file.name;
    document.getElementById('upload-sub').textContent = (file.size / 1024).toFixed(0) + ' KB';

    const sel = document.getElementById('sheet-select');
    sel.innerHTML = '';
    WB.SheetNames.forEach(n => {
      const o = document.createElement('option');
      o.value = o.textContent = n;
      sel.appendChild(o);
    });

    document.getElementById('config-card').classList.remove('hidden');
    document.getElementById('split-area').classList.remove('hidden');
    loadSheet(sel.value);
  };
  reader.readAsArrayBuffer(file);
}

function loadSheet(name) {
  const ws = WB.Sheets[name];
  // Parse ws cells directly — sheet_to_json skips empty rows causing index mismatch
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const rows = {}; // rows[wsRowIdx] = {colIdx: value}
  for (let r = range.s.r; r <= range.e.r; r++) {
    rows[r] = {};
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      rows[r][c] = cell ? (cell.v !== undefined ? cell.v : '') : '';
    }
  }
  sheetCache[name] = { rows, range };
  populateCols(name);
  updatePreview();
  updateFilenamePreview();
}

function headerRowIdx(name) {
  const { rows, range } = sheetCache[name];
  // Find the row with the most non-empty cells within first 5 rows (= header row)
  let bestRow = range.s.r;
  let bestCount = 0;
  for (let r = range.s.r; r <= Math.min(range.s.r + 4, range.e.r); r++) {
    const row = rows[r] || {};
    const count = Object.values(row).filter(v => v !== '' && v !== null && v !== undefined).length;
    if (count > bestCount) { bestCount = count; bestRow = r; }
  }
  return bestRow;
}

function populateCols(name) {
  const hi = headerRowIdx(name);
  const { rows, range } = sheetCache[name];
  const headerRow = rows[hi] || {};
  const sel = document.getElementById('col-select');
  sel.innerHTML = '';
  for (let c = range.s.c; c <= range.e.c; c++) {
    const h = headerRow[c];
    const o = document.createElement('option');
    o.value = c;
    o.textContent = (h !== '' && h !== null && h !== undefined) ? String(h) : '컬럼 ' + (c + 1);
    if (typeof h === 'string' && h.includes('대행사')) o.selected = true;
    sel.appendChild(o);
  }
}

function onSheetChange() {
  const n = document.getElementById('sheet-select').value;
  if (!sheetCache[n]) loadSheet(n);
  else { populateCols(n); updatePreview(); }
}
function onColChange() { updatePreview(); }

function getAgencyMap() {
  const name = document.getElementById('sheet-select').value;
  const col  = parseInt(document.getElementById('col-select').value);
  const { rows, range } = sheetCache[name];
  const hi = headerRowIdx(name);
  const map = new Map();
  for (let r = hi + 1; r <= range.e.r; r++) {
    const row = rows[r];
    if (!row) continue;
    const v = row[col];
    if (v === '' || v === null || v === undefined) continue;
    const k = String(v).trim();
    if (!k) continue;
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(r); // actual ws row index
  }
  return { map, hi };
}

function updatePreview() {
  const { map } = getAgencyMap();
  const chips = document.getElementById('agency-chips');
  chips.innerHTML = '';
  const arr = [...map.keys()];
  arr.slice(0, 15).forEach(a => {
    const el = document.createElement('span');
    el.className = 'chip'; el.textContent = a;
    chips.appendChild(el);
  });
  if (arr.length > 15) {
    const el = document.createElement('span');
    el.className = 'chip-more'; el.textContent = '+' + (arr.length - 15) + '개';
    chips.appendChild(el);
  }
  document.getElementById('preview-count').textContent =
    '총 ' + map.size + '개 대행사 → ' + map.size + '개 파일 생성 예정';
}

function updateFilenamePreview() {
  const pattern = '{agency}_' + (document.getElementById('filename-suffix').value || '');
  const { map } = getAgencyMap();
  const sample = [...map.keys()][0] || '(주)예지솔루션';
  document.getElementById('filename-preview').innerHTML =
    pattern.replace('{agency}', '<span class="agency-part">' + sample + '</span>') + '.xlsx';
}

/* ── core split + zip ── */
async function splitFiles() {
  const btn = document.getElementById('split-btn');
  btn.disabled = true;
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('progress-label').classList.remove('hidden');

  const sheetName = document.getElementById('sheet-select').value;
  const pattern   = '{agency}_' + (document.getElementById('filename-suffix').value || '');
  const { map, hi } = getAgencyMap();
  const ws = WB.Sheets[sheetName];
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const totalCols = range.e.c + 1;
  // hi is the actual ws row index of the header row (not a data array index)

  /* collect all xlsx blobs first, then zip in-browser */
  const files = []; // [{name, data: Uint8Array}]
  const total = map.size;
  let done = 0;

  for (const [agency, rowIndices] of map) {
    /* build a new worksheet by copying only header rows + this agency's rows */
    const newWs = {};
    let newRow = 0;

    // header rows (0 … hi)
    for (let srcRow = 0; srcRow <= hi; srcRow++) {
      for (let col = 0; col < totalCols; col++) {
        const addr = XLSX.utils.encode_cell({ r: srcRow, c: col });
        if (ws[addr]) newWs[XLSX.utils.encode_cell({ r: newRow, c: col })] = deepCopyCell(ws[addr]);
      }
      newRow++;
    }

    // only this agency's rows
    for (const srcRow of rowIndices) {
      for (let col = 0; col < totalCols; col++) {
        const addr = XLSX.utils.encode_cell({ r: srcRow, c: col });
        if (ws[addr]) newWs[XLSX.utils.encode_cell({ r: newRow, c: col })] = deepCopyCell(ws[addr]);
      }
      newRow++;
    }

    newWs['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: newRow - 1, c: totalCols - 1 } });
    if (ws['!cols']) newWs['!cols'] = JSON.parse(JSON.stringify(ws['!cols']));
    if (ws['!rows']) newWs['!rows'] = JSON.parse(JSON.stringify(ws['!rows']));
    if (ws['!merges']) {
      const kept = ws['!merges'].filter(m => m.s.r <= hi);
      if (kept.length) newWs['!merges'] = kept;
    }

    const newWb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(newWb, newWs, sheetName);

    // preserve workbook-level props
    if (WB.Props)     newWb.Props = WB.Props;
    if (WB.Custprops) newWb.Custprops = WB.Custprops;

    const filename = pattern.replace('{agency}', agency) + '.xlsx';
    const raw = XLSX.write(newWb, { bookType: 'xlsx', type: 'array', cellStyles: true });
    const u8 = raw instanceof Uint8Array ? raw : new Uint8Array(raw);
    files.push({ name: filename, data: u8 });

    done++;
    const pct = Math.round((done / total) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = done + ' / ' + total + ' 파일 처리 중...';
    await tick();
  }

  document.getElementById('progress-label').textContent = 'ZIP 생성 중...';
  await tick();

  try {
    const zipData = await buildZipNative(files);
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    triggerDownload(zipData, '대행사별_분할파일_' + today + '.zip');
  } catch(e) {
    // fflate 없으면 개별 다운로드 fallback
    for (let i = 0; i < files.length; i++) {
      triggerDownload(files[i].data, files[i].name);
      await sleep(150);
    }
  }

  showResults(files);
}

function deepCopyCell(cell) {
  const c = Object.assign({}, cell);
  if (cell.s) c.s = JSON.parse(JSON.stringify(cell.s));
  return c;
}

/* ── zip builder using fflate ── */
async function buildZipNative(files) {
  const zipObj = {};
  for (const f of files) {
    zipObj[f.name] = f.data;
  }
  return new Promise((resolve, reject) => {
    fflate.zip(zipObj, { level: 0 }, (err, data) => {
      if (err) reject(err);
      else resolve(data);
    });
  });
}

function triggerDownload(data, filename) {
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function tick() { return new Promise(r => setTimeout(r, 0)); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showResults(files) {
  const list = document.getElementById('result-list');
  list.innerHTML = '';
  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <svg class="icon icon-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span class="filename">${f.name}</span>
      <span class="row-count">${countRows(f)} 행</span>
    `;
    list.appendChild(item);
  });
  document.getElementById('result-card').classList.remove('hidden');
  document.getElementById('progress-label').textContent = '완료 — ZIP 파일로 다운로드되었습니다.';
  document.getElementById('split-btn').innerHTML = '✓ &nbsp;다운로드 완료';
}

function countRows(f) {
  try {
    const wb = XLSX.read(f.data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
    // subtract 1 for header
    return Math.max(0, range.e.r);
  } catch { return '?'; }
}
</script>
</body>
</html>
